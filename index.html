<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomodoro Clock</title>
    <meta name="description" content="Pomodoro Clock">
    <link rel="icon" href="assets/images/tomato.webp" />
    <link
      href="https://fonts.googleapis.com/css2?family=Balsamiq+Sans&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/f20d8ca545.js"
      crossorigin="anonymous"
    ></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Roboto+Mono:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/stylesheet.css" />
  </head>

  <body>
    <div id="main-content">
      <!-- HEADER -->
      <header>
        <img id="tomato-icon" src="assets/images/tomato.webp" alt="Dessin de tomate avec un chronomètre"/>
        <h1>Pomodoro Clock</h1>
      </header>

      <!-- TIMER CONTAINER -->
      <div class="timer-container">
        <svg
          class="timer-svg"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g class="timer-circle">
            <circle class="timer-circle-bg" cx="50" cy="50" r="45"></circle>
            <path
              id="timer-circle-remaining"
              stroke-dasharray="283"
              class=""
              d="
		          					M 50, 50
		          					m -45, 0
		          					a 45,45 0 1,0 90,0
		          					a 45,45 0 1,0 -90,0
								"
            ></path>
          </g>
        </svg>
        <div id="timer-display-container">
          <span id="timer-display"></span>
          <span id="session-display"></span>
          <span id="rounds-display" class="grey"></span>
        </div>
      </div>

      <!-- BUTTONS CONTAINER -->
      <div id="buttons-container">
        <i class="fas fa-sliders-h" id="settings-button"></i>
        <i class="far fa-play-circle green" id="play-button"></i>
        <i class="fas fa-undo" id="reset-button"></i>
      </div>
    </div>

    <!-- SETTINGS POP-UP -->
    <div id="settings-container">
      <img id="timer-icon" src="assets/images/timer.webp" alt="Dessin d'un chronomètre"/>
      <hr id="settings-hr" />
      <div class="input-container">
        <p class="red">Focus</p>
        <div id="input-controls">
          <i class="fas fa-minus minus-button"></i>
          <p id="focus-input"></p>
          <i class="fas fa-plus add-button"></i>
        </div>
      </div>
      <hr id="settings-hr" />
      <div class="input-container">
        <p class="green">Short Break</p>
        <div id="input-controls">
          <i class="fas fa-minus minus-button"></i>
          <p id="short-input"></p>
          <i class="fas fa-plus add-button"></i>
        </div>
      </div>
      <hr id="settings-hr" />
      <div class="input-container">
        <p class="blue">Long Break</p>
        <div id="input-controls">
          <i class="fas fa-minus minus-button"></i>
          <p id="long-input"></p>
          <i class="fas fa-plus add-button"></i>
        </div>
      </div>
      <hr id="settings-hr" />
      <div class="input-container">
        <p class="grey">Rounds</p>
        <div id="input-controls">
          <i class="fas fa-minus minus-button"></i>
          <p id="rounds-input"></p>
          <i class="fas fa-plus add-button"></i>
        </div>
      </div>
      <hr id="settings-hr" />
      <p id="close-settings-button">Close</p>
    </div>

    <!-- USER FEEDBACK POP-UP -->
    <div id="message-container">
      <audio id="audio" src="/" autoplay></audio>
      <p id="message"></p>
      <p id="close-message-button">Close</p>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.12/dayjs.min.js" integrity="sha512-FwNWaxyfy2XlEINoSnZh1JQ5TRRtGow0D6XcmAWmYCRgvqOUTnzCxPc9uF35u5ZEpirk1uhlPVA19tflhvnW1g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.12/plugin/duration.min.js" integrity="sha512-t0b2NyBypSms8nA81pldWo0mXbfMotsdYgvs4awmbi/GU/25YBNLnXj+I9DAMV7WGZ8+z8wtRolX7zSF2LN8UQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      dayjs.extend(window.dayjs_plugin_duration);
    </script>
    <script src="assets/script.js"></script>
  </body>
</html>
